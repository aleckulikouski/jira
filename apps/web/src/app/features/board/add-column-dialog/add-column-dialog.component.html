<h2 mat-dialog-title>Add Column</h2>
<mat-dialog-content>
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Column name</mat-label>
    <input matInput [(ngModel)]="name" (keyup.enter)="submit()" autofocus />
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-flat-button color="primary" [disabled]="!name.trim()" (click)="submit()">Add</button>
</mat-dialog-actions>

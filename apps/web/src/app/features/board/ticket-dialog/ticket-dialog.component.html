<h2 mat-dialog-title>{{ isEdit ? 'Edit' : 'New' }} Ticket</h2>

<mat-dialog-content>
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Title</mat-label>
    <input matInput [(ngModel)]="title" placeholder="Ticket title" required />
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Description</mat-label>
    <textarea matInput [(ngModel)]="description" placeholder="Optional description" rows="3"></textarea>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Column</mat-label>
    <mat-select [(ngModel)]="columnId">
      @for (col of data.columns; track col.id) {
        <mat-option [value]="col.id">{{ col.name }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions [class.edit-actions]="isEdit" [align]="'end'">
  @if (isEdit) {
    <button mat-button color="warn" (click)="deleteTicket()" class="delete-btn">Delete</button>
  }
  <div>
    <button mat-button mat-dialog-close>Cancel</button>
    <button mat-flat-button color="primary" (click)="submit()" [disabled]="!title.trim() || !columnId">
      Save
    </button>
  </div>
</mat-dialog-actions>
